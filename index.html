<!DOCTYPE html>
<html>
<head>
  <title>League Admin System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🏆 League Admin Dashboard</h1>

<h2 id="roundTitle"></h2>

<div id="fixtures"></div>

<div class="buttons">
  <button onclick="prevRound()">⬅ Back</button>
  <button onclick="submitResults()">💾 Save Results</button>
  <button onclick="nextRound()">Next ➡</button>
</div>

<div class="buttons">
  <button onclick="downloadTable()">Download Table</button>
  <button onclick="downloadFixtures()">Download Fixtures</button>
  <button onclick="downloadResults()">Download Results</button>
</div>

<h2>League Table</h2>
<table id="table"></table>

</div>

<script src="script.js"></script>
</body>
</html>
