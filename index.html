<!DOCTYPE html>
<html>
<head>
  <title>Pro League Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <h1>🏆 Pro League Dashboard</h1>

  <div class="topbar">
    <h2 id="roundTitle"></h2>
  </div>

  <div id="fixtures"></div>

  <div class="controls">
    <button onclick="prevRound()">⬅ Previous</button>
    <button onclick="submitResults()">💾 Save Matchday</button>
    <button onclick="nextRound()">Next ➡</button>
  </div>

  <div class="controls">
    <button onclick="downloadTable()">Download Table</button>
    <button onclick="downloadFixtures()">Download Fixtures</button>
    <button onclick="downloadResults()">Download Results</button>
  </div>

  <h2>League Table</h2>
  <table id="table"></table>

</div>

<script src="script.js"></script>
</body>
</html>
